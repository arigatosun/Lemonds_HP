<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>LEMONDS — Top B (Offset Collage)</title>

<style>
  html, body { margin: 0; overflow-x: hidden; background: #F4F4F4; }
  #root { width: 1920px; transform-origin: top left; transform: scale(var(--page-scale, 1)); }
  /* B案アクセント: 巨大ENタイポ＋ストロークアウトライン */
  .b-section { width: 1920px; margin: 0 auto; padding: 140px 100px 120px; box-sizing: border-box; position: relative; }
  .b-section--dark { background:#111; color:#F4F4F4; }
  .b-bigword {
    position:absolute; right: 60px; top: 60px;
    font: 900 220px/.85 var(--font-en); letter-spacing:-.02em;
    -webkit-text-stroke: 2px rgba(17,17,17,.18); color: transparent;
    pointer-events:none; user-select:none;
  }
  .b-section--dark .b-bigword { -webkit-text-stroke: 2px rgba(244,244,244,.18); }
  .b-eyebrow { font: 700 12px/1 var(--font-en); letter-spacing:.24em; color:#111; margin-bottom: 20px; display:inline-flex; align-items:center; gap:14px; }
  .b-section--dark .b-eyebrow { color:#F4F4F4; }
  .b-eyebrow::before { content:''; width:48px; height:1px; background: currentColor; }
  .b-title { font: 700 84px/1 var(--font-en); letter-spacing:.01em; color:#111; margin: 0 0 14px; }
  .b-section--dark .b-title { color:#F4F4F4; }
  .b-title-ja { font: 700 22px/1 var(--font-jp); letter-spacing:.12em; color:#111; }
  .b-section--dark .b-title-ja { color:rgba(244,244,244,.85); }
  .b-lead { max-width: 640px; font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; margin: 36px 0 64px; }
  .b-section--dark .b-lead { color: rgba(244,244,244,.85); }

  /* HERO: 写真を斜めにオフセットして重ねる */
  .b-hero { position:relative; width:1920px; height: 1100px; padding: 28px 80px 0; box-sizing:border-box; }
  .b-hero-frame {
    position:relative; width: 1760px; height: 720px; margin: 24px auto 0;
    background: #F4F4F4;
  }
  .b-photo {
    position:absolute; background-size:cover; background-position:center;
    box-shadow: 0 24px 48px -12px rgba(0,0,0,.18);
  }
  .b-p1 { left:0;    top:60px;  width: 720px; height: 540px; transform: rotate(-1.2deg); }
  .b-p2 { left:560px; top:0;     width: 760px; height: 540px; transform: rotate(0.8deg); z-index:2; }
  .b-p3 { left:1180px; top:80px;  width: 580px; height: 480px; transform: rotate(-0.6deg); }
  .b-p4 { left:200px; top:520px; width: 420px; height: 200px; transform: rotate(0.4deg); }
  .b-p5 { left:1320px; top:560px; width: 360px; height: 180px; transform: rotate(-1.4deg); }

  .b-hero-copy { position:absolute; left: 100px; top: 880px; max-width: 880px; }
  .b-hero-copy h1 {
    font: 700 92px/1.3 var(--font-jp); letter-spacing:.04em; color:#111; margin:0;
  }
  .b-hero-copy h1 mark { background:#111; color:#F4F4F4; padding: 0 12px; border-radius: 4px; }
  .b-hero-copy p { font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; margin: 28px 0 0; max-width: 540px; }

  /* 縦長サイドラベル（PICK UP の代替・A案の世界観そのまま新解釈） */
  .b-sidelabel {
    position:absolute; right: 80px; top: 80px;
    writing-mode: vertical-rl; text-orientation: mixed;
    font: 700 13px/1 var(--font-en); letter-spacing:.32em; color:#111;
    background: rgba(244,244,244,.92); padding: 24px 14px;
    border: 1px solid rgba(17,17,17,.18); z-index: 5;
  }
  .b-sidelabel small { font: 500 11px/1 var(--font-jp); letter-spacing:.16em; color:rgba(17,17,17,.6); display:block; margin-top: 18px; }

  /* SERVICE: 行動詞リスト */
  .b-svc { display:grid; grid-template-columns: 80px 1fr 1fr 320px; column-gap: 40px; row-gap: 0; }
  .b-svc .head, .b-svc .row { display:contents; }
  .b-svc-row { display:grid; grid-template-columns: 80px 1fr 1fr 320px; column-gap: 40px; align-items:center; padding: 36px 0; border-top: 1px solid rgba(17,17,17,.18); transition: background 200ms; }
  .b-svc-row:last-child { border-bottom: 1px solid rgba(17,17,17,.18); }
  .b-svc-row:hover { background: rgba(17,17,17,.04); }
  .b-svc-row .n { font: 700 32px/1 var(--font-en); letter-spacing:.04em; color:#111; }
  .b-svc-row .name { font: 700 28px/1.2 var(--font-jp); letter-spacing:.04em; color:#111; }
  .b-svc-row .name em { display:block; font: 600 12px/1 var(--font-en); letter-spacing:.18em; color:rgba(17,17,17,.5); font-style:normal; margin-bottom: 8px; }
  .b-svc-row .desc { font: 400 14px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(17,17,17,.78); }
  .b-svc-row .thumb { width: 320px; height: 180px; background-size:cover; background-position:center; }

  /* REASON: 大数字＋テキスト */
  .b-reason { display:grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px solid rgba(17,17,17,.18); border-bottom: 1px solid rgba(17,17,17,.18); }
  .b-reason .cell { padding: 56px 32px; border-right: 1px solid rgba(17,17,17,.18); display:flex; flex-direction:column; gap: 18px; min-height: 360px; }
  .b-reason .cell:last-child { border-right: 0; }
  .b-reason .cell .k { font: 700 12px/1 var(--font-en); letter-spacing:.24em; color: rgba(17,17,17,.55); }
  .b-reason .cell .v { font: 700 100px/.9 var(--font-en); letter-spacing:-.01em; color:#111; }
  .b-reason .cell .v small { font: 700 26px/1 var(--font-en); letter-spacing:.04em; opacity:.6; margin-left: 4px; }
  .b-reason .cell h3 { font: 700 22px/1.4 var(--font-jp); letter-spacing:.06em; color:#111; margin: auto 0 8px; }
  .b-reason .cell p { font: 400 14px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(17,17,17,.78); margin: 0; }

  /* STRENGTHS (Reason) — 斜めにオフセットされた番号タグ＋ハッチライン */
  .b-strengths { display:grid; grid-template-columns: repeat(3, 1fr); gap: 56px; padding-top: 36px; }
  .b-strength {
    position: relative; padding: 64px 36px 40px; background: #F4F4F4;
    border: 1px solid rgba(17,17,17,.18);
    transition: transform 220ms;
  }
  .b-strength:hover { transform: rotate(0deg) translateY(-4px) !important; }
  .b-strength-tag {
    position:absolute; top: -28px; left: 24px;
    background:#111; color:#F4F4F4; padding: 14px 22px;
    display:flex; flex-direction:column; gap: 4px; min-width: 140px;
    box-shadow: 0 8px 24px -8px rgba(17,17,17,.4);
  }
  .b-strength-tag-n { font: 700 28px/1 var(--font-en); letter-spacing: .04em; }
  .b-strength-tag-en { font: 600 11px/1 var(--font-en); letter-spacing: .22em; opacity:.7; }
  .b-strength-title { font: 700 30px/1.4 var(--font-jp); letter-spacing: .06em; color:#111; margin: 24px 0 24px; max-width: 320px; }
  .b-strength-rule {
    height: 8px; margin-bottom: 24px;
    background-image: repeating-linear-gradient(135deg, #111 0 1px, transparent 1px 6px);
  }
  .b-strength-copy { font: 400 14px/1.95 var(--font-jp); letter-spacing: .04em; color: rgba(17,17,17,.78); margin: 0 0 32px; }
  .b-strength-stamp {
    font: 700 11px/1 var(--font-en); letter-spacing: .22em; color: rgba(17,17,17,.45);
    border-top: 1px solid rgba(17,17,17,.18); padding-top: 16px;
  }

  /* PRODUCTION: 写真ストリップ＋下にステップ */
  .b-prod-strip { display:grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-bottom: 0; }
  .b-prod-strip .ph { aspect-ratio: 4/3; background-size:cover; background-position:center; filter: grayscale(20%); }
  .b-prod-grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
  .b-prod-grid .step { background: rgba(244,244,244,.06); padding: 32px 28px 36px; }
  .b-section--dark .b-prod-grid .step { background: rgba(244,244,244,.04); }
  .b-prod-grid .step .n { font: 700 14px/1 var(--font-en); letter-spacing:.18em; color: rgba(244,244,244,.6); margin-bottom: 14px; }
  .b-prod-grid .step h3 { font: 700 22px/1.4 var(--font-jp); letter-spacing:.06em; color:#F4F4F4; margin: 0 0 12px; }
  .b-prod-grid .step p { font: 400 13px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(244,244,244,.78); margin: 0; }

  /* PRODUCTION (cream) — 紙の指示書 / ポラロイド */
  .b-prod { display:flex; flex-direction:column; gap: 56px; padding-top: 24px; }
  .b-prod-row {
    display:grid; grid-template-columns: 200px 360px 1fr; gap: 56px; align-items:center;
    padding: 32px 0; border-top: 1px solid rgba(17,17,17,.18);
  }
  .b-prod-row:last-child { border-bottom: 1px solid rgba(17,17,17,.18); }
  .b-prod-num {
    font: 700 180px/.85 var(--font-en); letter-spacing: -.04em; color:#111;
    -webkit-text-stroke: 1px rgba(17,17,17,1);
  }
  .b-prod-photo {
    background: #F4F4F4; padding: 14px 14px 18px;
    box-shadow: 0 12px 28px -10px rgba(17,17,17,.28);
    border: 1px solid rgba(17,17,17,.14);
    transition: transform 220ms;
  }
  .b-prod-photo:hover { transform: rotate(0deg) !important; }
  .b-prod-photo .ph { width: 100%; aspect-ratio: 4/3; background-size:cover; background-position:center; filter: grayscale(8%); }
  .b-prod-photo .cap { font: 600 11px/1 var(--font-en); letter-spacing: .22em; color: rgba(17,17,17,.6); margin-top: 12px; }
  .b-prod-body { display:flex; flex-direction:column; gap: 14px; }
  .b-prod-en { font: 700 12px/1 var(--font-en); letter-spacing: .22em; color: rgba(17,17,17,.55); }
  .b-prod-body h3 { font: 700 32px/1.4 var(--font-jp); letter-spacing: .06em; color:#111; margin: 0; }
  .b-prod-rule { height: 6px; background-image: repeating-linear-gradient(90deg, #111 0 1px, transparent 1px 6px); margin: 4px 0 6px; }
  .b-prod-body p { font: 400 14px/1.95 var(--font-jp); letter-spacing: .04em; color: rgba(17,17,17,.78); margin: 0; max-width: 520px; }

  /* WORKS: A案のNewsCardをそのまま使う変則グリッド */
  .b-works { display:grid; grid-template-columns: 2fr 1fr 1fr; gap: 32px; }
  .b-works .lm-news-card { height: 480px; }
  .b-works .lm-news-card.tall { grid-row: span 2; height: 992px; }
  .b-works .below { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 32px; margin-top: 32px; grid-column: 1 / -1; }

  /* COMPANY */
  .b-company { display:grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items:start; }
  .b-company .lead p { font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; margin: 0 0 24px; max-width: 540px; }
  .b-company .table { background:#fff; padding: 48px 56px; border-radius: 28px; }
  .b-company dl { margin: 0; display:grid; grid-template-columns: 140px 1fr; row-gap: 22px; }
  .b-company dt { font: 600 12px/1.6 var(--font-en); letter-spacing:.18em; color: rgba(17,17,17,.55); margin: 0; }
  .b-company dd { font: 500 15px/1.6 var(--font-jp); letter-spacing:.04em; color:#111; margin: 0; }

  /* CONTACT */
  .b-contact { display:grid; grid-template-columns: 1fr 1fr; gap: 80px; }
  .b-contact .topics { display:flex; flex-direction:column; }
  .b-contact .topics .t { padding: 22px 0; border-bottom: 1px solid rgba(244,244,244,.16); font: 500 18px/1 var(--font-jp); letter-spacing:.04em; color: #F4F4F4; display:flex; justify-content:space-between; align-items:center; }
  .b-contact .topics .t .nu { font: 600 11px/1 var(--font-en); letter-spacing:.18em; color: rgba(244,244,244,.5); }
  .b-contact .topics .t:first-child { border-top: 1px solid rgba(244,244,244,.16); }
  .b-contact .ctas { display:flex; flex-direction:column; gap: 16px; align-items:flex-start; }
  .b-contact-btn {
    width: 100%; max-width: 480px; height: 84px; padding: 0 32px; border-radius: 0; border:0; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; font: 700 22px/1 var(--font-jp); letter-spacing:.08em;
  }
  .b-contact-btn--p { background:#F4F4F4; color:#111; }
  .b-contact-btn--s { background: transparent; color:#F4F4F4; border:1px solid rgba(244,244,244,.4); }
  .b-contact-btn .a { font: 500 22px/1 var(--font-en); }
</style>

<script>
window.LM_ASSET = function(filename){
  if (window.__resources) {
    var key = filename.replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/gi, '_');
    if (window.__resources[key]) return window.__resources[key];
  }
  return 'assets/' + filename;
};
</script>

<script type="text/babel">
function HeroB() {
  return (
    <section className="b-hero" data-screen-label="01 Hero">

      </div>
      <div className="b-hero-frame">
        <div className="b-photo b-p1" style={{backgroundImage:'url(${window.LM_ASSET('photo-business-meeting.jpg')})'}}/>
        <div className="b-photo b-p2" style={{backgroundImage:'url(${window.LM_ASSET('photo-concert-lights.jpg')})'}}/>
        <div className="b-photo b-p3" style={{backgroundImage:'url(${window.LM_ASSET('photo-merch-flatlay.jpg')})'}}/>
        <div className="b-photo b-p4" style={{backgroundImage:'url(${window.LM_ASSET('photo-cosmetics-pink.jpg')})'}}/>

function ServiceB() {
  const items = [
    ['01','OEM・ODM事業','OEM / ODM','企業・ブランド向けのオリジナルグッズやノベルティを中心に、商品企画から製造、納品までを一貫支援。','photo-business-meeting.jpg'],
    ['02','MD事業','MERCHANDISING','販売・流通を前提としたMD事業として、企画性と実用性を両立した商品開発を行います。','photo-merch-flatlay.jpg'],
    ['03','健康サポート機器・グッズ事業','HEALTH & APPAREL','EMS健康機器や機能性アパレルを中心に、法人向けに仕入れ・OEM・受注生産で柔軟に対応。','photo-cosmetics-mono.jpg'],
    ['04','倉庫・配送代行事業','LOGISTICS','自社通販、個人EC、同人関連販売など、多様な販売形態に対応した倉庫保管・配送代行。','photo-cosmetics-pink.jpg'],
    ['05','オンラインガチャ事業','ONLINE GACHA','オンライン上で楽しめるガチャ形式の販売施策を通じて、商品販売の新たな形を提案。','photo-friends-selfie.jpg'],
    ['06','パッケージ・グラフィックデザイン','GRAPHIC DESIGN','パッケージ、グッズデザインを中心としたブランディングおよび各種グラフィックデザイン。','photo-merch-flatlay.jpg'],

function ReasonB() {
  const items = [
    ['01','SCHEDULE','納期に合わせる進行力','イベント日程や発売時期に合わせて、仕様整理から製造・納品までのスケジュールを組み立てます。短納期の案件や急な調整にも、できる限り現実的な方法を探ります。'],
    ['02','BUDGET','予算に応じた提案力','素材、仕様、数量、製造ルートを調整し、目的とコストのバランスが取れた形をご提案します。作りたいものに対して、無理のない進め方を一緒に設計します。'],

function ProductionB() {
  const steps = [
    ['01','企画・仕様整理','BRIEFING','目的、数量、予算、納期、仕様を整理。グッズの方向性を一緒に固めます。','photo-business-meeting.jpg'],

const fitPage = () => {
  const w = document.documentElement.clientWidth;
  const scale = Math.min(1, w / 1920);
  const root = document.getElementById('root');
  root.style.setProperty('--page-scale', scale);
  document.body.style.height = (root.getBoundingClientRect().height) + 'px';
};
window.addEventListener('resize', fitPage);
requestAnimationFrame(fitPage);
window.addEventListener('load', fitPage);
setTimeout(fitPage, 300);
setTimeout(fitPage, 1200);
</script>
