<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>LEMONDS — Top C (Filmstrip)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html, body { margin: 0; overflow-x: hidden; background: #F4F4F4; }
  #root { width: 1920px; transform-origin: top left; transform: scale(var(--page-scale, 1)); }

  /* ── 共通あしらい：左に縦組みインデックス番号、右にタイトル群 ── */
  .c-section { width: 1920px; margin: 0 auto; padding: 140px 100px 120px; box-sizing:border-box; position:relative; }
  .c-section--dark { background:#111; color:#F4F4F4; }
  .c-index {
    position:absolute; left: 40px; top: 140px;
    writing-mode: vertical-rl; text-orientation: mixed;
    font: 700 12px/1 var(--font-en); letter-spacing:.32em; color:rgba(17,17,17,.6);
  }
  .c-section--dark .c-index { color: rgba(244,244,244,.6); }
  .c-section-head { display:grid; grid-template-columns: 1fr 720px; gap: 80px; margin-bottom: 72px; align-items:end; }
  .c-section-head h2 { font: 700 96px/.95 var(--font-en); letter-spacing:.01em; color:#111; margin: 0; }
  .c-section--dark .c-section-head h2 { color:#F4F4F4; }
  .c-section-head .ja { font: 700 22px/1 var(--font-jp); letter-spacing:.12em; color:#111; margin-top: 18px; }
  .c-section--dark .c-section-head .ja { color: rgba(244,244,244,.85); }
  .c-section-head .lead { font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; }
  .c-section--dark .c-section-head .lead { color: rgba(244,244,244,.85); }

  /* ── HERO: シングルワイドのフィルムストリップ写真 ───────────── */
  .c-hero { width: 1920px; padding: 32px 0 0; }
  .c-hero-bar { display:flex; justify-content:space-between; align-items:center; padding: 0 100px; font: 700 12px/1 var(--font-en); letter-spacing:.24em; color:#111; }
  .c-hero-strip {
    position:relative; margin: 32px 80px 0; height: 720px;
    border-radius: 4px; overflow:hidden;
    background: url(${window.LM_ASSET('photo-business-meeting.jpg')}) center/cover;
  }
  .c-hero-strip::before {
    /* 上下にフィルムの送り穴のような帯 */
    content:''; position:absolute; left:0; right:0; top:0; height: 32px;
    background-image: repeating-linear-gradient(90deg, #111 0 24px, transparent 24px 56px);
    background-size: 56px 32px; background-color:#F4F4F4;
  }
  .c-hero-strip::after {
    content:''; position:absolute; left:0; right:0; bottom:0; height: 32px;
    background-image: repeating-linear-gradient(90deg, #111 0 24px, transparent 24px 56px);
    background-size: 56px 32px; background-color:#F4F4F4;
  }
  .c-hero-tiles { position:absolute; inset: 32px 0; display:grid; grid-template-columns: repeat(5, 1fr); }
  .c-hero-tiles .t { background-size: cover; background-position:center; border-right: 2px solid #F4F4F4; }
  .c-hero-tiles .t:last-child { border-right:0; }

  .c-hero-copy { display:grid; grid-template-columns: 1fr 720px; gap: 80px; padding: 96px 100px 0; align-items:end; }
  .c-hero-copy h1 {
    font: 700 100px/1.3 var(--font-jp); letter-spacing:.04em; color:#111; margin: 0;
    text-align: right;
  }
  .c-hero-copy h1 mark { background: transparent; color:#111; border-bottom: 6px solid #111; padding-bottom: 4px; }
  .c-hero-copy .right { display:flex; flex-direction:column; gap: 24px; }
  .c-hero-copy .right .en { font: 700 20px/1.4 var(--font-en); letter-spacing:.04em; color:#111; }
  .c-hero-copy .right p { font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; margin:0; max-width: 540px; }
  .c-hero-copy .right .pickup {
    margin-top: 16px; padding: 18px 22px; background:#111; color:#F4F4F4;
    display:flex; justify-content:space-between; align-items:center; gap: 24px;
    font: 600 14px/1.4 var(--font-jp); letter-spacing:.06em;
  }
  .c-hero-copy .right .pickup small { display:block; font: 600 11px/1 var(--font-en); letter-spacing:.18em; color: rgba(244,244,244,.7); margin-bottom: 6px; }
  .c-hero-copy .right .pickup .a { font: 500 18px/1 var(--font-en); }

  /* ── SERVICE (C案) : 3列カード、画像が右下に重なるオフセット ── */
  .c-svc { display:grid; grid-template-columns: repeat(3,1fr); gap: 40px 32px; }
  .c-svc-card { position:relative; background:#fff; border-radius: 24px; padding: 40px 36px 200px; min-height: 360px; overflow:hidden; transition: transform 200ms; }
  .c-svc-card:hover { transform: translateY(-2px); }
  .c-svc-card .n { font: 700 14px/1 var(--font-en); letter-spacing:.18em; color: rgba(17,17,17,.5); margin-bottom: 20px; }
  .c-svc-card h3 { font: 700 26px/1.3 var(--font-jp); letter-spacing:.06em; color:#111; margin: 0 0 14px; }
  .c-svc-card .en { font: 600 12px/1 var(--font-en); letter-spacing:.18em; color: rgba(17,17,17,.5); margin-bottom: 14px; }
  .c-svc-card p { font: 400 14px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(17,17,17,.78); margin: 0; max-width: 320px; }
  .c-svc-card .img {
    position:absolute; right: -20px; bottom: -20px; width: 220px; height: 160px;
    background-size: cover; background-position: center; border-radius: 16px 0 0 0;
  }

  /* ── REASON: タイムライン縦軸 ── */
  .c-reason { display:flex; flex-direction:column; gap: 0; border-top: 1px solid rgba(17,17,17,.18); }
  .c-reason .row { display:grid; grid-template-columns: 120px 200px 1fr 320px; gap: 32px; padding: 48px 0; align-items:center; border-bottom: 1px solid rgba(17,17,17,.18); }
  .c-reason .row:hover { background: rgba(17,17,17,.03); }
  .c-reason .k { font: 700 12px/1 var(--font-en); letter-spacing:.22em; color: rgba(17,17,17,.55); }
  .c-reason .v { font: 700 80px/.9 var(--font-en); letter-spacing:-.01em; color:#111; }
  .c-reason .v small { font: 700 22px/1 var(--font-en); letter-spacing:.04em; opacity:.5; margin-left: 4px; }
  .c-reason h3 { font: 700 28px/1.3 var(--font-jp); letter-spacing:.06em; color:#111; margin: 0 0 8px; }
  .c-reason p { font: 400 14px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(17,17,17,.78); margin: 0; }
  .c-reason .thumb { width: 320px; height: 200px; background-size:cover; background-position:center; border-radius: 16px; }

  /* ── STRENGTHS (Reason) — 縦レール＋カウンター＋極大数字 ── */
  .c-strengths { display:grid; grid-template-columns: 80px 1fr; gap: 48px; padding-top: 24px; }
  .c-strengths-rail {
    position:relative; display:flex; flex-direction:column; justify-content:space-around; align-items:center;
    padding: 60px 0;
  }
  .c-strengths-rail::before {
    content:''; position:absolute; left:50%; top: 0; bottom: 0; width: 1px;
    background: rgba(17,17,17,.18);
  }
  .c-rail-tick {
    width: 16px; height: 16px; border-radius: 50%;
    background: #F4F4F4; border: 2px solid #111; position:relative; z-index:1;
  }
  .c-strengths-list { display:flex; flex-direction:column; }
  .c-strength {
    position:relative; display:grid; grid-template-columns: 1fr 280px;
    gap: 64px; align-items:center;
    padding: 56px 0; border-top: 1px solid rgba(17,17,17,.18);
    overflow:hidden;
  }
  .c-strength:last-child { border-bottom: 1px solid rgba(17,17,17,.18); }
  .c-strength-meta {
    grid-column: 1 / -1;
    display:flex; align-items:baseline; gap: 24px; margin-bottom: 8px;
    font: 700 12px/1 var(--font-en); letter-spacing:.22em; color: rgba(17,17,17,.55);
  }
  .c-strength-counter { font: 700 22px/1 var(--font-en); letter-spacing:.04em; color:#111; }
  .c-strength-counter small { font: 600 12px/1 var(--font-en); letter-spacing:.18em; color: rgba(17,17,17,.45); margin-left: 4px; }
  .c-strength-body h3 { font: 700 36px/1.4 var(--font-jp); letter-spacing: .06em; color:#111; margin: 0 0 18px; }
  .c-strength-body p { font: 400 15px/1.95 var(--font-jp); letter-spacing: .04em; color: rgba(17,17,17,.78); margin: 0; max-width: 720px; }
  .c-strength-num {
    grid-column: 2; grid-row: 2;
    font: 700 220px/.85 var(--font-en); letter-spacing: -.04em;
    -webkit-text-stroke: 2px rgba(17,17,17,.22); color: transparent;
    text-align: right; align-self: center; pointer-events:none; user-select:none;
  }
  .c-strength-body { grid-column: 1; grid-row: 2; }

  /* ── PRODUCTION: 横スクロール風カード ── */  .c-prod { display:grid; grid-template-columns: repeat(4,1fr); gap: 24px; }
  .c-prod .step { background: rgba(244,244,244,.08); border-radius: 24px; overflow:hidden; display:flex; flex-direction:column; }
  .c-prod .step .ph { aspect-ratio: 4/3; background-size:cover; background-position:center; }
  .c-prod .step .body { padding: 32px 28px 36px; display:flex; flex-direction:column; gap: 12px; flex:1; }
  .c-prod .step .n { display:inline-block; font: 700 12px/1 var(--font-en); letter-spacing:.18em; color: rgba(244,244,244,.7); padding: 6px 12px; background: rgba(244,244,244,.12); align-self:flex-start; }
  .c-prod .step h3 { font: 700 22px/1.4 var(--font-jp); letter-spacing:.06em; color:#F4F4F4; margin: 0; }
  .c-prod .step p { font: 400 13px/1.84 var(--font-jp); letter-spacing:.04em; color: rgba(244,244,244,.78); margin: 0; }

  /* ── PRODUCTION: ジグザグショーケース（白背景） ── */
  .c-section--paper { background: #FFFFFF; }
  .c-prod-zig { position: relative; padding: 24px 0 0; }
  .c-prod-spine {
    position:absolute; left: 50%; top: 24px; bottom: 0; width: 1px;
    background-image: linear-gradient(180deg, rgba(17,17,17,.32) 0 8px, transparent 8px 16px);
    background-size: 1px 16px;
    transform: translateX(-.5px);
  }
  .c-prod-zig-row {
    position:relative;
    display:grid; grid-template-columns: 1fr 80px 1fr; align-items:center;
    gap: 0; padding: 56px 0;
  }
  .c-prod-zig-row.l .c-prod-zig-photo { grid-column: 1; justify-self: end; }
  .c-prod-zig-row.l .c-prod-zig-body  { grid-column: 3; justify-self: start; padding-left: 24px; }
  .c-prod-zig-row.r .c-prod-zig-photo { grid-column: 3; justify-self: start; order: 0; }
  .c-prod-zig-row.r .c-prod-zig-body  { grid-column: 1; justify-self: end;  text-align: right; padding-right: 24px; }
  .c-prod-zig-photo {
    position:relative; width: 720px; height: 420px;
    background-size:cover; background-position:center;
    border-radius: 4px; filter: grayscale(8%);
    box-shadow: 0 24px 48px -16px rgba(17,17,17,.22);
  }
  .c-prod-zig-cap {
    position:absolute; left: 16px; bottom: -28px;
    background:#111; color:#F4F4F4; padding: 8px 14px;
    font: 600 11px/1 var(--font-en); letter-spacing: .22em;
  }
  .c-prod-zig-row.r .c-prod-zig-cap { left: auto; right: 16px; }
  .c-prod-zig-pin {
    grid-column: 2; justify-self: center; position: relative; z-index: 1;
    width: 80px; height: 80px; border-radius: 50%;
    background: #FFFFFF; border: 2px solid #111;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 0 12px #FFFFFF;
  }
  .c-prod-zig-pin span { font: 700 26px/1 var(--font-en); letter-spacing: .04em; color:#111; }
  .c-prod-zig-body { max-width: 520px; display:flex; flex-direction:column; gap: 12px; }
  .c-prod-zig-en { font: 700 12px/1 var(--font-en); letter-spacing: .22em; color: rgba(17,17,17,.55); }
  .c-prod-zig-body h3 { font: 700 36px/1.4 var(--font-jp); letter-spacing: .06em; color:#111; margin: 0; }
  .c-prod-zig-body p { font: 400 15px/1.95 var(--font-jp); letter-spacing: .04em; color: rgba(17,17,17,.78); margin: 0; }

  /* ── WORKS: 1+4のメイン+グリッド ── */
  .c-works-main { position:relative; height: 560px; border-radius: 24px; overflow:hidden; background-size:cover; background-position:center; margin-bottom: 32px; }
  .c-works-main::after { content:''; position:absolute; inset:0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,.7)); }
  .c-works-main .info { position:absolute; left: 40px; right: 40px; bottom: 40px; color:#fff; z-index:1; display:flex; flex-direction:column; gap: 8px; }
  .c-works-main .cat { font: 700 12px/1 var(--font-en); letter-spacing:.22em; color: rgba(255,255,255,.85); }
  .c-works-main .ttl { font: 700 36px/1.3 var(--font-jp); letter-spacing:.04em; }
  .c-works-main .date { font: 500 12px/1 var(--font-en); letter-spacing:.18em; opacity:.7; }
  .c-works-grid { display:grid; grid-template-columns: repeat(4,1fr); gap: 32px; }

  /* ── COMPANY ── */
  .c-company { display:grid; grid-template-columns: 1fr 1fr; gap: 80px; }
  .c-company .intro p { font: 400 16px/1.95 var(--font-jp); letter-spacing:.04em; color:#111; margin: 0 0 24px; max-width: 540px; }
  .c-company .table { background:#fff; padding: 48px 56px; border-radius: 28px; }
  .c-company dl { margin: 0; display:grid; grid-template-columns: 140px 1fr; row-gap: 22px; }
  .c-company dt { font: 600 12px/1.6 var(--font-en); letter-spacing:.18em; color: rgba(17,17,17,.55); margin: 0; }
  .c-company dd { font: 500 15px/1.6 var(--font-jp); letter-spacing:.04em; color:#111; margin: 0; }

  /* ── CONTACT ── */
  .c-contact { display:grid; grid-template-columns: 1fr 1fr; gap: 80px; }
  .c-contact .chips { display:flex; flex-wrap:wrap; gap: 12px; }
  .c-contact .chip { padding: 14px 22px; border-radius: 9999px; border: 1px solid rgba(244,244,244,.32); font: 500 14px/1 var(--font-jp); letter-spacing:.04em; color: rgba(244,244,244,.92); }
  .c-contact .ctas { display:flex; flex-direction:column; gap: 16px; }
  .c-contact-btn { display:flex; justify-content:space-between; align-items:center; height: 88px; padding: 0 36px; border-radius: 24px; border:0; cursor:pointer; font: 700 22px/1 var(--font-jp); letter-spacing:.08em; }
  .c-contact-btn--p { background:#F4F4F4; color:#111; }
  .c-contact-btn--s { background: transparent; color:#F4F4F4; border:1px solid rgba(244,244,244,.4); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Header.standalone.jsx"></script>
<script type="text/babel" src="Footer.standalone.jsx"></script>

<meta name="ext-resource-dependency" content="assets/lemonds-logo.svg" data-resource-id="lemonds_logo" />
<meta name="ext-resource-dependency" content="assets/photo-business-meeting.jpg" data-resource-id="photo_business_meeting" />
<meta name="ext-resource-dependency" content="assets/photo-collage-hero.png" data-resource-id="photo_collage_hero" />
<meta name="ext-resource-dependency" content="assets/photo-concert-lights.jpg" data-resource-id="photo_concert_lights" />
<meta name="ext-resource-dependency" content="assets/photo-cosmetics-mono.jpg" data-resource-id="photo_cosmetics_mono" />
<meta name="ext-resource-dependency" content="assets/photo-cosmetics-pink.jpg" data-resource-id="photo_cosmetics_pink" />
<meta name="ext-resource-dependency" content="assets/photo-friends-selfie.jpg" data-resource-id="photo_friends_selfie" />
<meta name="ext-resource-dependency" content="assets/photo-merch-flatlay.jpg" data-resource-id="photo_merch_flatlay" />
<script>
window.LM_ASSET = function(filename){
  if (window.__resources) {
    var key = filename.replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/gi, '_');
    if (window.__resources[key]) return window.__resources[key];
  }
  return 'assets/' + filename;
};
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function HeroC() {
  const tiles = ['photo-business-meeting.jpg','photo-concert-lights.jpg','photo-merch-flatlay.jpg','photo-cosmetics-pink.jpg','photo-cosmetics-mono.jpg'];
  return (
    <section className="c-hero" data-screen-label="01 Hero">
      <div className="c-hero-bar">
        <span>— ISSUE 04 / TURNING IDEAS INTO VALUE</span>
        <span style={{color:'rgba(17,17,17,.6)'}}>EST.20XX  TOKYO  /  OEM · MD · LOGISTICS</span>
      </div>
      <div className="c-hero-strip">
        <div className="c-hero-tiles">
          {tiles.map(t => <div key={t} className="t" style={{backgroundImage:`url(${window.LM_ASSET(t)})`}}/>)}
        </div>
      </div>
      <div className="c-hero-copy">
        <h1>想いを、<br/><mark>価値あるカタチ</mark>に。</h1>
        <div className="right">
          <div className="en">TURNING IDEAS<br/>INTO MEANINGFUL VALUE.</div>
          <p>企業のブランド価値を高めるオリジナルグッズを、企画から製造まで一貫してサポートします。コスト、納期、レスポンス——案件ごとの条件に合わせて、現実的な進行を設計します。</p>
          <div className="pickup">
            <div><small>PICK UP / 2026.04.10</small>30周年記念グッズの量産事例を公開しました</div>
            <span className="a">→</span>
          </div>
        </div>
      </div>
    </section>
  );
}

function ServiceC() {
  const items = [
    ['01','OEM・ODM事業','OEM / ODM','企業・ブランド向けのオリジナルグッズやノベルティを企画から製造まで一貫支援。','photo-business-meeting.jpg'],
    ['02','MD事業','MERCHANDISING','販売・流通を前提としたMD事業として、企画性と実用性を両立した商品開発。','photo-merch-flatlay.jpg'],
    ['03','健康サポート機器','HEALTH & APPAREL','EMS健康機器や機能性アパレルを中心に、法人向けに柔軟に対応。','photo-cosmetics-mono.jpg'],
    ['04','倉庫・配送代行','LOGISTICS','自社通販、個人EC、同人関連販売など多様な販売形態に対応。','photo-cosmetics-pink.jpg'],
    ['05','オンラインガチャ','ONLINE GACHA','オンライン上で楽しめるガチャ形式の販売施策で新たな販売の形を提案。','photo-friends-selfie.jpg'],
    ['06','グラフィックデザイン','GRAPHIC DESIGN','パッケージ、グッズデザインを中心としたブランディングおよびデザイン。','photo-merch-flatlay.jpg'],
  ];
  return (
    <section className="c-section" data-screen-label="03 Service">
      <div className="c-index">— INDEX / 01  SERVICE</div>
      <div className="c-section-head">
        <div><h2>SERVICE</h2><div className="ja">事業内容</div></div>
        <p className="lead">アパレル、ノベルティ、健康機器、EC施策まで。幅広く対応する総合グッズカンパニーとして、お客様のニーズにお応えします。</p>
      </div>
      <div className="c-svc">
        {items.map(([n,name,en,desc,img]) => (
          <div key={n} className="c-svc-card">
            <div className="n">— {n}</div>
            <div className="en">{en}</div>
            <h3>{name}</h3>
            <p>{desc}</p>
            <div className="img" style={{backgroundImage:`url(${window.LM_ASSET(img)})`}}/>
          </div>
        ))}
      </div>
    </section>
  );
}

function ReasonC() {
  const items = [
    ['01','SCHEDULE','納期に合わせる進行力','イベント日程や発売時期に合わせて、仕様整理から製造・納品までのスケジュールを組み立てます。短納期の案件や急な調整にも、できる限り現実的な方法を探ります。'],
    ['02','BUDGET','予算に応じた提案力','素材、仕様、数量、製造ルートを調整し、目的とコストのバランスが取れた形をご提案します。作りたいものに対して、無理のない進め方を一緒に設計します。'],
    ['03','RESPONSE','速く、柔軟な対応力','見積もり、仕様確認、進行中の相談までスピーディーに対応。案件ごとの条件に合わせて、製造先や現場とも連携しながら柔軟に進めます。'],
  ];
  return (
    <section className="c-section" data-screen-label="04 Strengths">
      <div className="c-index">— INDEX / 02  STRENGTHS</div>
      <div className="c-section-head">
        <div><h2>STRENGTHS</h2><div className="ja">ルモンズの強み</div></div>
        <p className="lead">コスト、納期、レスポンス。<br/>案件ごとの条件に合わせて、現実的な進行と確かな納品を支えます。</p>
      </div>

      <div className="c-strengths">
        <div className="c-strengths-rail">
          {items.map(([n]) => <span key={n} className="c-rail-tick"/>)}
        </div>
        <div className="c-strengths-list">

const fitPage = () => {
  const w = document.documentElement.clientWidth;
  const scale = Math.min(1, w / 1920);
  const root = document.getElementById('root');
  root.style.setProperty('--page-scale', scale);
  document.body.style.height = (root.getBoundingClientRect().height) + 'px';
};
window.addEventListener('resize', fitPage);
requestAnimationFrame(fitPage);
window.addEventListener('load', fitPage);
setTimeout(fitPage, 300);
setTimeout(fitPage, 1200);
</script>
