<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>LEMONDS ENTERTAINMENT</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  /* 1920 基準のデザインをビューポート幅にフィットさせる */
  html, body { margin: 0; overflow-x: hidden; background: #F4F4F4; }
  #root {
    width: 1920px;
    transform-origin: top left;
    transform: scale(var(--page-scale, 1));
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<meta name="ext-resource-dependency" content="assets/lemonds-logo-wordmark.svg" data-resource-id="lemonds_logo_wordmark" />
<meta name="ext-resource-dependency" content="assets/lemonds-logo.svg" data-resource-id="lemonds_logo" />
<meta name="ext-resource-dependency" content="assets/photo-business-meeting.jpg" data-resource-id="photo_business_meeting" />
<meta name="ext-resource-dependency" content="assets/photo-concert-lights.jpg" data-resource-id="photo_concert_lights" />
<meta name="ext-resource-dependency" content="assets/photo-cosmetics-mono.jpg" data-resource-id="photo_cosmetics_mono" />
<meta name="ext-resource-dependency" content="assets/photo-cosmetics-pink.jpg" data-resource-id="photo_cosmetics_pink" />
<meta name="ext-resource-dependency" content="assets/photo-friends-selfie.jpg" data-resource-id="photo_friends_selfie" />
<meta name="ext-resource-dependency" content="assets/photo-merch-flatlay.jpg" data-resource-id="photo_merch_flatlay" />
<script>
window.LM_ASSET = function(filename){
  if (window.__resources) {
    var key = filename.replace(/\.[^.]+$/, '').replace(/[^a-z0-9]+/gi, '_');
    if (window.__resources[key]) return window.__resources[key];
  }
  return 'assets/' + filename;
};
</script>
</head>
<body>
<div id="root" data-screen-label="01 Top"></div>

<script type="text/babel" src="Header.standalone.jsx"></script>
<script type="text/babel" src="Hero.standalone.jsx"></script>
<script type="text/babel" src="PickUp.standalone.jsx"></script>
<script type="text/babel" src="ServiceGrid.standalone.jsx"></script>
<script type="text/babel" src="Reason.standalone.jsx"></script>
<script type="text/babel" src="Production.standalone.jsx"></script>
<script type="text/babel" src="Works.standalone.jsx"></script>
<script type="text/babel" src="Company.standalone.jsx"></script>
<script type="text/babel" src="Contact.standalone.jsx"></script>
<script type="text/babel" src="Footer.standalone.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <>
      <Header/>
      <Hero/>
      <ServiceGrid/>
      <Reason/>
      <Production/>
      <Works/>
      <Company/>
      <Contact/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// ── 1920基準のレイアウトを、ビューポート幅に等比でフィット
const fitPage = () => {
  const w = document.documentElement.clientWidth;
  const scale = Math.min(1, w / 1920);
  const root = document.getElementById('root');
  root.style.setProperty('--page-scale', scale);
  // scale後の実高さで body 高さを再設定（毎回リセットしてからの再測定）
  document.body.style.height = '';
  // 次フレームで scrollHeight を確定
  requestAnimationFrame(() => {
    const h = root.getBoundingClientRect().height;
    document.body.style.height = h + 'px';
  });
};
window.addEventListener('resize', fitPage);
window.addEventListener('load', fitPage);
requestAnimationFrame(fitPage);
setTimeout(fitPage, 300);
setTimeout(fitPage, 1200);
setTimeout(fitPage, 3000);

// 画像読み込みごとに再フィット
document.addEventListener('load', (e) => {
  if (e.target && e.target.tagName === 'IMG') fitPage();
}, true);

// レイアウト変動を監視
if (window.ResizeObserver) {
  const ro = new ResizeObserver(fitPage);
  ro.observe(document.getElementById('root'));
}
</script>

  </svg>
</template>
</body>
</html>
