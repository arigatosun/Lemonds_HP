<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<title>LEMONDS ENTERTAINMENT</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="data:,"/>
<link rel="stylesheet" href="styles/colors_and_type.css"/>
<link rel="stylesheet" href="styles/site.css"/>
<style>
  /* 1920 基準のデザインをビューポート幅にフィットさせる */
  html, body { margin: 0; overflow-x: hidden; background: #F4F4F4; }
  /* scale を打ち消した高さを body に与えるラッパ */
  #stage {
    width: 100%;
    height: var(--page-height, auto);
    overflow: hidden;
  }
  #root {
    width: 1920px;
    transform-origin: top left;
    transform: scale(var(--page-scale, 1));
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="stage"><div id="root" data-screen-label="01 Top"></div></div>

<script type="text/babel" src="src/home/Header.jsx"></script>
<script type="text/babel" src="src/home/Hero.jsx"></script>
<script type="text/babel" src="src/home/ServiceGrid.jsx?v=20260508-service-radius"></script>
<script type="text/babel" src="src/home/Production.jsx?v=20260506-top-images"></script>
<script type="text/babel" src="src/home/Works.jsx?v=20260506-top-images"></script>
<script type="text/babel" src="src/home/News.jsx"></script>
<script type="text/babel" src="src/home/Company.jsx?v=20260506-top-images"></script>
<script type="text/babel" src="src/home/Contact.jsx?v=20260506-top-images"></script>
<script type="text/babel" src="src/shared/Footer.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <>
      <Header/>
      <Hero/>
      <ServiceGrid/>
      <Production/>
      <Works/>
      <News/>
      <Company/>
      <Contact/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// ── 1920基準のレイアウトを、ビューポート幅に等比でフィット
const fitPage = () => {
  const w = document.documentElement.clientWidth;
  const root = document.getElementById('root');
  const stage = document.getElementById('stage');
  if (w <= 1024) {
    root.style.setProperty('--page-scale', 1);
    stage.style.removeProperty('--page-height');
    return;
  }
  const scale = Math.min(1, w / 1920);
  root.style.setProperty('--page-scale', scale);
  // scale 前の root 自然高さ × scale を stage 高さに反映
  const naturalH = root.offsetHeight; // transform は offsetHeight に影響しない
  stage.style.setProperty('--page-height', (naturalH * scale) + 'px');
};
window.addEventListener('resize', fitPage);
window.addEventListener('load', fitPage);
requestAnimationFrame(fitPage);
setTimeout(fitPage, 300);
setTimeout(fitPage, 1200);
setTimeout(fitPage, 3000);

document.addEventListener('load', (e) => {
  if (e.target && e.target.tagName === 'IMG') fitPage();
}, true);

if (window.ResizeObserver) {
  const ro = new ResizeObserver(fitPage);
  ro.observe(document.getElementById('root'));
}
</script>
<script src="src/dev-inspector.js"></script>
</body>
</html>
